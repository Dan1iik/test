<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka nenalezena – Smart Okna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wdth,wght@0,75..125,200..900;1,75..125,200..900&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --off-white: #f7f8fa;
    --border: #e2e5ec;
    --text: #0f1117;
    --text-mid: #4a5068;
    --text-light: #8a90a8;
    --accent: #1a5fa8;
    --accent-light: #2775c9;
    --accent-pale: #e6f0fb;
    --accent-dark: #0f4080;
    --radius: 14px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--off-white);
    color: var(--text);
    font-family: 'Mona Sans', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem;
    background: rgba(247,248,250,0.94);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo-wrap { display: flex; align-items: center; gap: .6rem; text-decoration: none; }
  .logo-icon {
    width: 36px; height: 36px; background: var(--accent); border-radius: 9px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 3px; padding: 7px;
  }
  .logo-icon span { background: rgba(255,255,255,.9); border-radius: 2px; }
  .logo-text { font-size: 1.1rem; font-weight: 700; font-stretch: 110%; color: var(--text); letter-spacing: -.02em; }

  /* MAIN */
  main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 4rem 2rem;
    position: relative; overflow: hidden;
  }
  main::before {
    content: '404';
    position: absolute;
    font-size: clamp(200px, 35vw, 380px);
    font-weight: 900;
    font-stretch: 125%;
    color: rgba(26,95,168,.04);
    letter-spacing: -.06em;
    line-height: 1;
    user-select: none;
    pointer-events: none;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
  }

  .content {
    text-align: center;
    max-width: 520px;
    position: relative; z-index: 1;
    animation: fadeUp .6s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

  /* okno ilustrace */
  .window-illustration {
    width: 120px; height: 140px;
    margin: 0 auto 2.5rem;
    position: relative;
  }
  .window-illustration svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 12px 28px rgba(26,95,168,.15));
    animation: floatWin 5s ease-in-out infinite;
  }
  @keyframes floatWin { 0%,100%{transform:translateY(0) rotate(-.5deg)} 50%{transform:translateY(-10px) rotate(.5deg)} }

  .error-tag {
    display: inline-flex; align-items: center; gap: .5rem;
    background: var(--accent-pale); color: var(--accent);
    font-size: .68rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    padding: .35rem 1rem; border-radius: 100px; margin-bottom: 1.2rem;
  }
  .error-tag::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }

  h1 {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 800; font-stretch: 110%;
    line-height: 1.1; letter-spacing: -.03em;
    color: var(--text); margin-bottom: 1rem;
  }
  h1 em { font-style: italic; font-weight: 300; color: var(--accent); }

  p {
    font-size: 1rem; color: var(--text-mid);
    line-height: 1.75; margin-bottom: 2rem;
  }

  .actions { display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: .5rem;
    padding: .85rem 2rem; background: var(--accent); color: #fff;
    font-size: .82rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    text-decoration: none; border-radius: 100px; font-family: inherit;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(26,95,168,.3);
  }
  .btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,95,168,.4); }
  .btn-primary svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: .5rem;
    padding: .85rem 1.8rem;
    font-size: .82rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-mid); text-decoration: none;
    border: 1.5px solid var(--border); border-radius: 100px;
    font-family: inherit; transition: color .2s, border-color .2s;
  }
  .btn-ghost:hover { color: var(--accent); border-color: rgba(26,95,168,.3); }

  /* rychlé odkazy */
  .quick-links {
    margin-top: 3rem; padding-top: 2rem;
    border-top: 1px solid var(--border);
  }
  .quick-links-label {
    font-size: .68rem; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--text-light); margin-bottom: 1rem;
  }
  .quick-links-row { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; }
  .quick-link {
    font-size: .78rem; font-weight: 600; color: var(--text-mid);
    text-decoration: none; padding: .4rem .9rem;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 100px; transition: all .2s;
  }
  .quick-link:hover { color: var(--accent); border-color: rgba(26,95,168,.3); background: var(--accent-pale); }

  /* FOOTER */
  footer {
    text-align: center; padding: 1.4rem 2rem;
    border-top: 1px solid var(--border);
    font-size: .74rem; color: var(--text-light); font-weight: 500;
  }

  @media (max-width: 600px) {
    nav { padding: 0 1.2rem; }
    main { padding: 3rem 1.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo-wrap" href="/">
    <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
    <span class="logo-text">Smart Okna</span>
  </a>
</nav>

<main>
  <div class="content">

    <!-- plovoucí okno -->
    <div class="window-illustration">
      <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
        <rect width="120" height="140" rx="5" fill="white" stroke="#d4d8e2" stroke-width="2.5"/>
        <rect x="6" y="6" width="50" height="62" rx="2" fill="#e8f0f8" stroke="#bcc8dc" stroke-width="1.5"/>
        <rect x="64" y="6" width="50" height="62" rx="2" fill="#e8f0f8" stroke="#bcc8dc" stroke-width="1.5"/>
        <rect x="6" y="76" width="108" height="58" rx="2" fill="#e8f0f8" stroke="#bcc8dc" stroke-width="1.5"/>
        <rect x="56" y="0" width="8" height="140" fill="white"/>
        <rect x="0" y="68" width="120" height="8" fill="white"/>
        <circle cx="60" cy="72" r="5" fill="#e2e8f0" stroke="#c8d4e8" stroke-width="1"/>
        <!-- křížek na okně — 404 detail -->
        <line x1="18" y1="24" x2="42" y2="48" stroke="#ddd" stroke-width="2" stroke-linecap="round"/>
        <line x1="42" y1="24" x2="18" y2="48" stroke="#ddd" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="error-tag">Chyba 404</div>

    <h1>Stránka <em>nenalezena</em></h1>

    <p>Stránka, kterou hledáte, neexistuje nebo byla přesunuta.<br>Zkuste se vrátit na hlavní stránku nebo nás kontaktujte.</p>

    <div class="actions">
      <a href="/" class="btn-primary">
        Zpět na hlavní stránku
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="/#kontakt" class="btn-ghost">Kontaktovat nás</a>
    </div>

    <div class="quick-links">
      <div class="quick-links-label">Nebo přejděte přímo na</div>
      <div class="quick-links-row">
        <a href="/#produkty" class="quick-link">Produkty</a>
        <a href="/#o-nas" class="quick-link">O nás</a>
        <a href="/#projekty" class="quick-link">Reference</a>
        <a href="/#faq" class="quick-link">FAQ</a>
        <a href="/#kontakt" class="quick-link">Kontakt</a>
      </div>
    </div>

  </div>
</main>

<footer>
  © 2026 Smart Okna s.r.o. · <a href="/" style="color:inherit;text-decoration:none;">smartokna.cz</a>
</footer>

</body>
</html>
